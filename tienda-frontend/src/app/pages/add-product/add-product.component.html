<div class="add-product-container">
  <div class="form-header">
    <h3>Registrar Nuevo Producto</h3>
  </div>

  <div class="main-layout">
    <!-- Vista Previa de la Tarjeta del Producto -->
    <div class="preview-section">
      <div class="preview-card">
        <div class="image-container">
          <img [src]="fullImagePath" alt="Vista previa">
        </div>
        <div class="preview-info">
          <span class="preview-category">{{ productData.categoria || 'Categoría' }}</span>
          <h4>{{ productData.nombre || 'Nombre del Producto' }}</h4>
          <span class="preview-price">{{ productData.precio | currency:'USD':'symbol':'1.2-2' }}</span>
        </div>
      </div>
    </div>

    <!-- Formulario de Registro -->
    <form (ngSubmit)="onSubmit()" #productForm="ngForm" class="product-form">
      <div class="form-group">
        <label>Nombre del Producto</label>
        <input type="text" [(ngModel)]="productData.nombre" name="nombre" placeholder="Ej. Ratón Gamer RGB" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Categoría</label>
          <select [(ngModel)]="productData.categoria" name="categoria" required>
            <option value="Celulares">Celulares</option>
            <option value="Computadoras">Computadoras</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Monitores">Monitores</option>
            <option value="Audio">Audio</option>
            <option value="Muebles">Muebles</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
        <div class="form-group">
          <label>Precio ($)</label>
          <input type="number" [(ngModel)]="productData.precio" name="precio" min="0" step="0.01" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Stock Inicial</label>
          <input type="number" [(ngModel)]="productData.stock" name="stock" min="0" required>
        </div>
        <div class="form-group">
          <label>Seleccionar Imagen</label>
          <div class="custom-file-upload">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
            <button type="button" class="btn-browse" (click)="fileInput.click()">
              🔍 Buscar Imagen
            </button>
            <span class="file-name" *ngIf="fileNameSelected">
              📄 {{ fileNameSelected }}
            </span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="productData.descripcion" name="descripcion" rows="4" placeholder="Describe el producto..." required></textarea>
      </div>

      <button type="submit" [disabled]="!productForm.valid" class="btn-submit">
        Guardar Producto
      </button>
    </form>
  </div>
</div>
